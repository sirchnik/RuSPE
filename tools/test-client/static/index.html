<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuSPE Token Inspector</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>RuSPE Token Inspector</h1>
        </header>

        <main>
            <section class="animation-section">
                <div class="arch-diagram" id="arch-diagram" style="position: relative;">
                    <svg id="trail-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;"></svg>
                    <div class="rich-world">
                        <div class="apps-row">
                            <div class="node app-node" id="node-app">
                                <div class="icon">📱</div>
                                <span>Tock App</span>
                            </div>
                            <div class="node app-node placeholder">
                                <span>App 2</span>
                            </div>
                            <div class="node app-node placeholder">
                                <span>App 3</span>
                            </div>
                        </div>
                        <div class="node os-node" id="node-kernel">
                            <div class="icon">⚙️</div>
                            <span>Kernel (Rich OS)</span>
                        </div>
                    </div>
                    <div class="world-divider"></div>
                    <div class="secure-world">
                        <div class="apps-row">
                            <div class="node service-node" id="node-attest">
                                <div class="icon">📜</div>
                                <span>Attest Service</span>
                            </div>
                            <div class="node service-node" id="node-crypto">
                                <div class="icon">🔑</div>
                                <span>Crypto Service</span>
                            </div>
                        </div>
                        <div class="node os-node" id="node-spe">
                            <div class="icon">🛡️</div>
                            <span>SPE (Secure OS)</span>
                        </div>
                    </div>
                </div>
                
                <div class="controls">
                    <button id="fetch-btn" class="glow-button">Fetch & Verify Token</button>
                    <div id="status-text" class="status-text">Ready</div>
                </div>
            </section>

            <section id="results-section" class="results-section hidden">
                <div class="card verification-card" id="verification-card">
                    <h2 id="verification-title">Verification Status</h2>
                    <p id="verification-msg"></p>
                </div>

                <div class="card claims-card">
                    <h2>PSA Token Claims</h2>
                    <div class="claims-grid" id="claims-grid">
                        <!-- Claims will be inserted here -->
                    </div>
                </div>

                <div class="card sw-components-card" id="sw-components-container" style="display: none;">
                    <h2>Software Components</h2>
                    <div class="sw-components-list" id="sw-components-list">
                        <!-- Software components will be inserted here -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
